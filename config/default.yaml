# Default Configuration for Branham Model API

# Device Configuration
device:
  preference: auto  # Options: mps, cuda, cpu, auto
  use_bnb_quant: false
  dtype: fp16  # Options: fp16, bf16, fp32

# Inference Backend (for embedding/reranking)
# - auto: Branch-based selection (develop→HF, main+CUDA→vLLM)
# - huggingface: Force direct HuggingFace transformers
# - vllm: Force vLLM backend (requires CUDA)
inference_backend: auto

# API Configuration
api:
  host: 0.0.0.0
  port: 8000
  workers: 1
  log_level: info
  # Required bearer token for POST /api/chat.
  # FE must send: Authorization: Bearer <token>
  # Can be overridden via env: CHAT_API_BEARER_KEY
  bearer_key: b6766b2e-9a26-4342-9bef-5da4ad67e51c
  cors_origins:
    - "*"

# Model Configuration (Configurable - no hard-coded choices)
models:
  embedding_model_id: Qwen/Qwen3-Embedding-0.6B  # 32k context, 1024 dim, multilingual
  reranker_model_id: Qwen/Qwen3-Reranker-0.6B    # Paired with embedding model
  tokenizer_model_id: null  # To be configured

# LLM Provider Configuration
# Switch between providers by changing `llm.provider`.
# Each provider has its own model name, base_url, and key_prefix.
# Keys follow the pattern: {key_prefix}_A .. {key_prefix}_E
llm:
  provider: openrouter  # "mixed", "openrouter", or "deepseek"
  temperature: 0.2
  timeout: 30.0
  reasoning:
    # Production: Kimi K2.5 with reasoning fully off. Confirmed in the
    # 2026-05-21 sweep that Kimi calls tools and follows the prompt without
    # any reasoning budget; this is the requirement for our SSE flow.
    enabled: false
  # OpenRouter provider routing: pin to Fireworks (fastest verified host for
  # Kimi K2.5). DeepInfra and Together are fallbacks. Drops median latency
  # from ~19.6s (default routing) to ~11.6s.
  extra_body:
    provider:
      order:
        - fireworks
        - deepinfra
        - together
      allow_fallbacks: true
  providers:
    openrouter:
      model: openrouter/moonshotai/kimi-k2.5
      base_url: https://openrouter.ai/api/v1
      key_prefix: OPENROUTER_API_KEY
    deepseek:
      model: deepseek/deepseek-chat
      base_url: https://api.deepseek.com
      key_prefix: DEEPSEEK_API_KEY

# Retrieval Configuration
retrieval:
  bm25:
    top_n: 25  # Parallel retrieval, topN=25 each
    # Stage 3 / BM25 build + query parameters (datasets/docs/BM25_INDEX.md)
    k1: 1.2
    b: 0.75
    normalize: true
    keep_apostrophes: true
    strip_paragraph_markers: true
    remove_stopwords: true
  dense:
    top_n: 25  # Parallel retrieval, topN=25 each
    # Stage 4 / Dense retrieval (datasets/docs/DENSE_RETRIEVAL.md)
    embed:
      # Qwen3-Embedding-0.6B: 32k context, 1024 dim native (supports 32-1024 MRL)
      dim: 1024            # Native dim; can truncate to 512/256 if needed
      dtype: fp16          # fp16/bf16/fp32
      batch_size: 16       # Qwen is heavier than Jina; adjust for memory
      max_length: 32768    # Full 32k context for query embedding
      pooling: last_token  # Qwen uses last token pooling (not mean)
      padding_side: left   # Qwen requires left padding
      normalize: true
      trust_remote_code: true
      query_prefix: ""     # Not used; use query_instruction_template instead
      doc_prefix: ""       # Documents don't need prefix for Qwen
      # Qwen instruction format for query embedding
      query_instruction_template: "Instruct: {task}\nQuery:{query}"
      query_task_description: "Given a question about William Branham's teachings or sermons, retrieve relevant sermon passages that answer the query"
    faiss:
      index_type: flatip   # flatip/hnsw/ivf_pq
      hnsw_m: 32
      hnsw_ef_construction: 200
      hnsw_ef_search: 64
      ivf_nlist: 1024
      pq_m: 16
      nprobe: 10
  reranker:
    enabled: never  # Options: always, conditional, never (default: never - reranker adds latency without significant benefit)
    # Trigger signals (any one triggers reranker)
    # Thresholds calibrated from real query tests (2026-01-27)
    triggers:
      score_std_threshold: 0.015    # Very flat distribution (typical: 0.01-0.05)
      overlap_threshold: 1          # No agreement at all (typical: 0-3)
      top_score_threshold: 0.55     # Weak semantic match
      quote_intent: true            # Quote-seeking queries trigger reranker
    # Qwen3-Reranker-0.6B model settings
    model:
      max_length: 32768             # Full 32k context for reranking
      dtype: fp16                   # fp16/bf16/fp32
      batch_size: 8                 # Batch size for HuggingFace path
      trust_remote_code: true
      # Domain-specific instruction
      instruction: "Given a question about William Branham's teachings or sermons, determine if the document contains relevant information to answer the query"
    # vLLM-specific settings (for production)
    vllm:
      max_model_len: 32768          # Full 32k context
      gpu_memory_utilization: 0.6   # Lower than embedder to leave headroom
      enable_prefix_caching: true
  fusion:
    method: rrf  # Reciprocal Rank Fusion (normalizes BM25 vs dense scores)
    rrf_k: 60    # RRF smoothing parameter (standard value)
  collation:
    max_sermons: 8  # Cap at 8 unique sermons (date_ids)
  expansion:
    depth: 0  # 0=disabled, 1=±1 adjacent chunks. Sermon Lookup Tool handles more context.
  language_detection:
    # Controls langid usage for query language detection.
    # "never"  – rely on frontend-provided user_language; skip langid entirely (default, saves ~800ms cold start)
    # "auto"   – use langid when frontend does not send user_language; pre-load model at container startup
    mode: never
  refusal:
    # Conservative pre-LLM refusal guardrails (reduced to avoid valid-query refusals):
    # - English queries refuse only when BOTH dense and BM25 are below thresholds.
    # - Non-English queries use dense threshold only (BM25 is skipped).
    min_dense_score: 0.20
    min_bm25_score: 0.20

# Chunking Configuration (Section 5.1)
chunking:
  target_tokens: 350
  strategy: paragraph_aware  # Cut at paragraph boundaries
  sentence_split: true  # Split long paragraphs at sentence boundaries

# Text Store Configuration
text_store:
  type: sqlite  # Options: sqlite, redis, postgres, files
  sqlite:
    # Canonical text store produced by Stage 1–2 (datasets/docs/DATA_FORMAT.md)
    path: ./data/processed/chunks.sqlite
  # redis:
  #   url: redis://localhost:6379/0
  # postgres:
  #   url: postgresql://user:pass@localhost/branham

# Index Paths
indices:
  bm25_path: ./data/indices/bm25.index
  faiss_path: ./data/indices/faiss.index
  chunk_store_path: ./data/processed/chunks.sqlite

# Model Paths (for LoRA adapters)
adapters:
  continued_pretrain: ./models/adapters/continued_pretrain
  qa_instruction: ./models/adapters/qa_instruction

# Performance & Latency Targets (Section 2.2)
performance:
  retrieval_target_ms: 150  # p95 retrieval stage target
  ttft_target_ms: 1200      # p95 time-to-first-token target

# Refusal Messages
refusal:
  # Off-topic: query is not about Branham/sermons/Bible at all (e.g. "capital of France")
  fixed_message: "I can only answer questions based on William Branham's sermons. I don't have enough relevant information to answer your question."
  # Insufficient context: query IS about Branham but evidence is too weak to answer reliably
  insufficient_context_message: "I searched through the sermon archives but couldn't find enough relevant context to give you a reliable answer on this. If you can provide more details — such as a sermon title, approximate date, or related topic — I'd be happy to search again."

