# Default Configuration for Branham Model API

# Device Configuration
device:
  preference: auto  # Options: mps, cuda, cpu, auto
  use_bnb_quant: false
  dtype: fp16  # Options: fp16, bf16, fp32

# API Configuration
api:
  host: 0.0.0.0
  port: 8000
  workers: 1
  log_level: info
  cors_origins:
    - "*"

# Model Configuration (Configurable - no hard-coded choices)
models:
  embedding_model_id: jinaai/jina-embeddings-v3  # Default for now: strong multilingual + fast enough for RAG
  reranker_model_id: null   # To be configured
  generator_model_id: null  # To be configured
  tokenizer_model_id: null  # To be configured

# Retrieval Configuration
retrieval:
  bm25:
    top_n: 20
    threshold: 0.5
    # Stage 3 / BM25 build + query parameters (datasets/docs/BM25_INDEX.md)
    k1: 1.2
    b: 0.75
    normalize: true
    keep_apostrophes: true
    strip_paragraph_markers: true
    remove_stopwords: true
  dense:
    top_n: 20
    # Stage 4 / Dense retrieval (datasets/docs/DENSE_RETRIEVAL.md)
    embed:
      dim: 512
      dtype: fp16          # fp16/bf16/fp32
      batch_size: 32
      max_length: 8192
      pooling: mean        # mean/cls/pooler
      normalize: true
      trust_remote_code: true
      query_prefix: ""     # e.g., "query: " for E5
      doc_prefix: ""       # e.g., "passage: " for E5
    faiss:
      index_type: flatip   # flatip/hnsw/ivf_pq
      hnsw_m: 32
      hnsw_ef_construction: 200
      hnsw_ef_search: 64
      ivf_nlist: 1024
      pq_m: 16
      nprobe: 10
  reranker:
    enabled: conditional  # Options: always, conditional, never
    trigger_threshold: 0.15
  fusion:
    final_top_k: 7
  expansion:
    default_depth: 1
    max_depth: 2

# Chunking Configuration (Section 5.1)
chunking:
  target_tokens: 350
  strategy: paragraph_aware  # Cut at paragraph boundaries
  sentence_split: true  # Split long paragraphs at sentence boundaries

# Text Store Configuration
text_store:
  type: sqlite  # Options: sqlite, redis, postgres, files
  sqlite:
    # Canonical text store produced by Stage 1–2 (datasets/docs/DATA_FORMAT.md)
    path: ./data/processed/chunks.sqlite
  # redis:
  #   url: redis://localhost:6379/0
  # postgres:
  #   url: postgresql://user:pass@localhost/branham

# Index Paths
indices:
  bm25_path: ./data/indices/bm25.index
  faiss_path: ./data/indices/faiss.index
  chunk_store_path: ./data/processed/chunks.sqlite

# Model Paths (for LoRA adapters)
adapters:
  continued_pretrain: ./models/adapters/continued_pretrain
  qa_instruction: ./models/adapters/qa_instruction

# Performance & Latency Targets (Section 2.2)
performance:
  retrieval_target_ms: 150  # p95 retrieval stage target
  ttft_target_ms: 1200      # p95 time-to-first-token target

# Refusal Messages
refusal:
  fixed_message: "I can only answer questions based on William Branham's sermons. I don't have enough relevant information to answer your question."

